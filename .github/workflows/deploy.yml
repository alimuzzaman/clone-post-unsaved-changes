name: Deploy to WordPress.org

# Publishes a tagged release to the WordPress.org plugin SVN repository.
#
# Trigger by publishing a GitHub Release whose tag matches the plugin's
# Stable tag (e.g. tag `1.0.0` for `Stable tag: 1.0.0`). The build output in
# `build/` is gitignored, so it is regenerated here before the SVN deploy; the
# `.distignore` file decides what gets shipped.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SVN_USERNAME — your WordPress.org username
#   SVN_PASSWORD — your WordPress.org password

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: save-as-draft
