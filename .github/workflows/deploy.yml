name: Deploy to WordPress.org

# Publishes a tagged release to the WordPress.org plugin SVN repository and
# uploads the release zip to GitHub.
#
# Triggered by:
#  - Publishing a GitHub Release (which under the hood creates/pushes a tag)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SVN_USERNAME — your WordPress.org username
#   SVN_PASSWORD — your WordPress.org password

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    name: Build, Deploy, and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to WordPress.org
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: clone-post-unsaved-changes

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deploy.outputs.zip-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
