<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F6BF0"/>
      <stop offset="1" stop-color="#7A3FF2"/>
    </linearGradient>
    <linearGradient id="sheet" x1="80" y1="60" x2="200" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF1FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1B1F4B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>

  <!-- Back sheet (the "copy") -->
  <rect x="58" y="52" width="116" height="148" rx="14" fill="#FFFFFF" opacity="0.38"/>

  <!-- Front sheet with folded corner -->
  <g filter="url(#shadow)">
    <path d="M88 70 h74 a14 14 0 0 1 14 14 v120 a14 14 0 0 1 -14 14 h-88 a14 14 0 0 1 -14 -14 V96 z"
          fill="url(#sheet)"/>
    <path d="M88 70 v18 a8 8 0 0 1 -8 8 H62 z" fill="#C9D2FF"/>
  </g>

  <!-- Text lines on the draft -->
  <g fill="#8DA0E8">
    <rect x="80" y="120" width="66" height="9" rx="4.5"/>
    <rect x="80" y="140" width="80" height="9" rx="4.5"/>
    <rect x="80" y="160" width="52" height="9" rx="4.5"/>
  </g>

  <!-- "New" badge -->
  <circle cx="178" cy="186" r="30" fill="#22C55E" stroke="#FFFFFF" stroke-width="6"/>
  <path d="M178 172 v28 M164 186 h28" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
</svg>
